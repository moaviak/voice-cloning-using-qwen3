name: Self-Hosted Deploy Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure required models exist
        run: |
          set -euo pipefail
          VOICE_MODEL_DIR="models/voice-cloning-model"
          TTS_MODEL_DIR="models/tts-model"

          missing=0
          if [ ! -f "$VOICE_MODEL_DIR/config.json" ]; then
            echo "Voice cloning model missing: $VOICE_MODEL_DIR"
            missing=1
          fi
          if [ ! -f "$TTS_MODEL_DIR/config.json" ]; then
            echo "TTS model missing: $TTS_MODEL_DIR"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            python scripts/download_model.py
          else
            echo "Models already available. Skipping download."
          fi

      - name: Restart API systemd service
        run: |
          set -euo pipefail
          sudo systemctl daemon-reload
          sudo systemctl restart voice-cloning-api
          sudo systemctl enable voice-cloning-api
          sudo systemctl --no-pager --full status voice-cloning-api

      - name: Verify deployed API health
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8000/api/v1/health" > /tmp/health.json; then
              echo "Health check passed."
              cat /tmp/health.json
              exit 0
            fi
            echo "Waiting for service health... ($i/30)"
            sleep 5
          done
          echo "Health check failed after restart."
          sudo journalctl -u voice-cloning-api -n 200 --no-pager || true
          exit 1
