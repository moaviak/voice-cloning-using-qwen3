name: Build & Push Docker Image

on:
  push:
    branches:
      - main
  release:
    types: [published]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/voice-cloning-engine

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (for multi-platform + cache) ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to Docker Hub ───────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Extract metadata for tags ─────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag :latest on pushes to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag with git SHA for traceability (e.g. :sha-abc1234)
            type=sha,prefix=sha-
            # Tag with release version if triggered by a release (e.g. :v1.2.0)
            type=semver,pattern={{version}}

      # ── 5. Build and push ─────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between builds to speed up CI
          cache-from: type=gha
          cache-to: type=gha,mode=max
