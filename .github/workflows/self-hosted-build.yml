name: Self-Hosted Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure required models exist
        run: |
          set -euo pipefail
          VOICE_MODEL_DIR="models/voice-cloning-model"
          TTS_MODEL_DIR="models/tts-model"

          missing=0

          if [ ! -f "$VOICE_MODEL_DIR/config.json" ]; then
            echo "Voice cloning model not found at $VOICE_MODEL_DIR"
            missing=1
          fi

          if [ ! -f "$TTS_MODEL_DIR/config.json" ]; then
            echo "TTS model not found at $TTS_MODEL_DIR"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "Downloading missing models..."
            python scripts/download_model.py
          else
            echo "Required models already present. Skipping download."
          fi

      - name: Start API and run health check
        run: |
          set -euo pipefail

          python scripts/run_api.py --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          API_PID=$!
          echo "API started with PID: $API_PID"

          cleanup() {
            if kill -0 "$API_PID" >/dev/null 2>&1; then
              echo "Stopping API server (PID: $API_PID)"
              kill "$API_PID"
              wait "$API_PID" || true
            fi
          }
          trap cleanup EXIT

          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8000/api/v1/health" > /tmp/health.json; then
              echo "Health check passed."
              cat /tmp/health.json
              exit 0
            fi
            echo "Waiting for API to become ready... ($i/60)"
            sleep 5
          done

          echo "Health check failed. API did not become ready in time."
          echo "---- API LOGS ----"
          cat api.log
          exit 1
