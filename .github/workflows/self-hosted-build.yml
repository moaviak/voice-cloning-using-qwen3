name: Self-Hosted Build & Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m venv ${{ github.workspace }}/venv
          ${{ github.workspace }}/venv/bin/pip install --upgrade pip
          ${{ github.workspace }}/venv/bin/pip install -r requirements.txt

      - name: Ensure required models exist
        run: |
          set -euo pipefail
          VOICE_MODEL_DIR="models/voice-cloning-model"
          TTS_MODEL_DIR="models/tts-model"

          missing=0
          if [ ! -f "$VOICE_MODEL_DIR/config.json" ]; then
            echo "Voice cloning model not found at $VOICE_MODEL_DIR"
            missing=1
          fi
          if [ ! -f "$TTS_MODEL_DIR/config.json" ]; then
            echo "TTS model not found at $TTS_MODEL_DIR"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "Downloading missing models..."
            python scripts/download_model.py
          else
            echo "Required models already present. Skipping download."
          fi

      - name: Start API and run health check
        run: |
          set -euo pipefail

          ${{ github.workspace }}/venv/bin/python scripts/run_api.py --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          API_PID=$!
          # ... rest unchanged

  deploy:
    runs-on: self-hosted
    # Only deploy on push to main/master, not on PRs
    if: github.event_name == 'push'
    # Only deploy if smoke test passed
    needs: build-and-smoke-test
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reload systemd and restart API service
        run: |
          # Copy the service file if it changed
          sudo cp deploy/fastapi.service /etc/systemd/system/fastapi.service

          sudo systemctl daemon-reload
          sudo systemctl enable fastapi
          sudo systemctl restart fastapi

      - name: Wait for service to be healthy
        run: |
          set -euo pipefail

          echo "=== Systemd service status ==="
          sudo systemctl status fastapi --no-pager || true

          echo "=== Last 50 lines of journald logs ==="
          sudo journalctl -u fastapi -n 50 --no-pager || true

          echo "=== Checking if process is actually running ==="
          pgrep -fa python || echo "No python process found"

          echo "=== Checking if port 8000 is bound ==="
          ss -tlnp | grep 8000 || echo "Nothing listening on port 8000"

          echo "=== Attempting health check ==="
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8000/api/v1/health" > /tmp/health.json; then
              echo "Production health check passed."
              cat /tmp/health.json
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done

          echo "=== FINAL systemd status ==="
          sudo systemctl status fastapi --no-pager || true
          sudo journalctl -u fastapi -n 100 --no-pager || true
          exit 1
